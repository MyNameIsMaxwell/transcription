<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Загрузка аудио и получение резюме</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
      /* Пример стилей для контейнера игры */
      #gameContainer {
          width: 100%;
          height: 300px;
          background: #f0f0f0;
          display: none; /* изначально скрыт */
      }
    </style>
</head>
<body>
    <div class="container">
        <h1>Загрузите аудиофайл для получения резюме</h1>
        <form id="uploadForm" enctype="multipart/form-data">
            <label for="audioFile">Выберите аудиофайл:</label><br>
            <input type="file" id="audioFile" name="file" accept="audio/*" required><br><br>
            <label for="engine">Движок транскрибации:</label><br>
            <select id="engine" name="engine" required>
                <option value="whisper">Whisper (локально, CPU)</option>
                <option value="speechkit">Yandex SpeechKit (облако)</option>
            </select><br><br>
            <label for="prompt">Промпт (необязательно):</label><br>
            <textarea id="prompt" name="prompt" rows="3" cols="50" placeholder="Например: Создай краткое содержание в виде списка ключевых тезисов..."></textarea><br><br>
            <button type="submit">Загрузить и обработать</button>
        </form>

        <div class="progress" id="progressContainer" style="display:none;">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div id="message" style="margin-top:20px;"></div>

        <!-- Контейнер для игры -->
        <div id="gameContainer">
            <p>Пока идет обработка, поиграйте в игру.</p>
            <!-- Здесь разместите вашу игру, например canvas для шариков -->
        </div>

        <h2>История загрузок</h2>
        <div id="history"></div>
    </div>

    <script>
        console.log("Скрипт загружен!");

        document.addEventListener("DOMContentLoaded", () => {
            console.log("DOM полностью загружен!");

            const uploadForm = document.getElementById('uploadForm');
            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');
            const messageDiv = document.getElementById('message');
            const historyDiv = document.getElementById('history');
            const gameContainer = document.getElementById('gameContainer');
            const submitButton = uploadForm.querySelector('button[type="submit"]');

            function startGame() {
                console.log("Игра запущена");
                gameContainer.style.display = "block";
            }

            function stopGame() {
                console.log("Игра остановлена");
                gameContainer.style.display = "none";
            }

            async function pollStatus(fileId) {
                console.log("pollStatus вызван для fileId:", fileId);
                const pollInterval = 2000;
                const interval = setInterval(async () => {
                    try {
                        const response = await fetch(`/status/${fileId}`);
                        const data = await response.json();
                        console.log("pollStatus response:", data);
                        
                        // Обновляем прогресс-бар
                        if (data.progress !== undefined) {
                            progressBar.style.width = `${data.progress}%`;
                        }
                        
                        // Обновляем сообщение
                        if (data.message) {
                            messageDiv.innerText = data.message;
                        }
                        
                        if (data.status === "done") {
                            clearInterval(interval);
                            stopGame();
                            submitButton.disabled = false;
                            messageDiv.innerText = "Обработка завершена!";
                            if (data.download_url) {
                                messageDiv.innerHTML += `<br><a href="${data.download_url}" target="_blank" style="color: #007bff; text-decoration: underline;">Скачать результат</a>`;
                            }
                            // Обновляем историю
                            await updateHistory();
                        } else if (data.status === "error") {
                            clearInterval(interval);
                            stopGame();
                            submitButton.disabled = false;
                            messageDiv.innerText = `Ошибка: ${data.error || data.message || "Неизвестная ошибка"}`;
                            messageDiv.style.color = "red";
                        }
                    } catch (error) {
                        console.error("Error polling status:", error);
                    }
                }, pollInterval);
            }

            async function updateHistory() {
                try {
                    const response = await fetch('/history');
                    const data = await response.json();
                    if (data.history && data.history.length > 0) {
                        let html = "<ul>";
                        const userId = data.user_id || "";
                        data.history.forEach(file => {
                            const downloadUrl = `/download/${userId}/${file}`;
                            html += `<li><a href="${downloadUrl}" target="_blank">${file}</a></li>`;
                        });
                        html += "</ul>";
                        historyDiv.innerHTML = html;
                    } else {
                        historyDiv.innerHTML = "<em>История пуста</em>";
                    }
                } catch (error) {
                    console.error("Error updating history:", error);
                }
            }

            uploadForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                console.log("Форма отправлена");
                const formData = new FormData(uploadForm);

                submitButton.disabled = true;
                progressContainer.style.display = "block";
                progressBar.style.width = "0%";
                messageDiv.innerText = "Загрузка файла...";
                startGame();

                try {
                    const response = await fetch('/upload/', {
                        method: 'POST',
                        body: formData
                    });
                    const result = await response.json();
                    console.log("Ответ от /upload/:", result);
                    messageDiv.innerText = result.message;
                    progressBar.style.width = "10%";
                    
                    if (result.file_id) {
                        pollStatus(result.file_id);
                    } else {
                        messageDiv.innerText = "Ошибка: не получен file_id";
                        messageDiv.style.color = "red";
                        submitButton.disabled = false;
                        stopGame();
                    }
                } catch (error) {
                    console.error("Error uploading file:", error);
                    messageDiv.innerText = `Ошибка загрузки: ${error.message}`;
                    messageDiv.style.color = "red";
                    submitButton.disabled = false;
                    stopGame();
                }
            });

            // Загружаем историю при загрузке страницы
            updateHistory();
        });
    </script>
</body>
</html>
